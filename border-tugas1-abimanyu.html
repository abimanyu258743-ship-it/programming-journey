<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Tugas 1</title>
  <style>
    .solid {
      border: 5px solid yellow;
      padding: 10px;
      background-color: rgb(170, 170, 145);
    }
    .dotted {
      border: 3px dotted black;
      padding: 10px;
      background-color: silver;
    }
    .double {
      border: 5px double red;
      padding: 10px;
      background-color: rgb(232, 139, 139);
    }
    .dashed {
      border: 3px dashed blueviolet;
      padding: 10px;
      background-color: rgb(184, 126, 237);
    }
     .groove {
      border: 5px groove paleturquoise;
      padding: 10px;
      background-color: rgb(6, 223, 223);
    }
    .ridge {
      border: 3px groove antiquewhite;
      padding: 10px;
      background-color: rgb(222, 145, 44);
    }
  </style>
  
</head>
<body>
  <div class="solid">Garis Versi Solid</div>
  <div class="dashed">Garis Versi Dashed </div>
  <div class="dotted">Garis Versi Dotted</div>
  <div class="double">Garis Versi Double</div>
  <div class="groove">Garis Versi Groove</div>
</body>
</html>
